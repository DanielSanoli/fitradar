name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint/test/build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fitradar
          POSTGRES_USER: fitradar
          POSTGRES_PASSWORD: fitradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitradar -d fitradar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/fitradar
      DATABASE_USERNAME: fitradar
      DATABASE_PASSWORD: fitradar
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test and package
        run: mvn -B clean verify -Dskip.frontend.build=true

  frontend:
    name: Frontend (lint/test/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  frontend-assets:
    name: PWA asset smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
