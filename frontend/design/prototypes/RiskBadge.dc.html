<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; line-height:1; white-space:nowrap; border:1px solid; background:{{ bg }}; color:{{ fg }}; border-color:{{ bd }}; font-family:'Segoe UI', system-ui, -apple-system, sans-serif;">
  <span style="width:6px; height:6px; border-radius:999px; background:{{ dot }}; box-shadow:0 0 8px {{ dot }};"></span>
  {{ label }}
</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:170,&quot;height&quot;:52},&quot;level&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;baixo&quot;,&quot;medio&quot;,&quot;alto&quot;],&quot;default&quot;:&quot;alto&quot;,&quot;tsType&quot;:&quot;'baixo'|'medio'|'alto'&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const map = {
      baixo: { label: "Risco baixo", bg: "hsl(165 76% 48% / 0.12)", fg: "hsl(165 55% 70%)", bd: "hsl(165 76% 48% / 0.32)", dot: "hsl(165 76% 48%)" },
      medio: { label: "Risco médio", bg: "hsl(38 100% 56% / 0.12)", fg: "hsl(38 92% 70%)", bd: "hsl(38 100% 56% / 0.34)", dot: "hsl(38 100% 56%)" },
      alto:  { label: "Risco alto", bg: "hsl(0 72% 67% / 0.14)", fg: "hsl(0 82% 80%)", bd: "hsl(0 72% 67% / 0.36)", dot: "hsl(0 72% 67%)" },
    };
    const level = this.props.level || "alto";
    const m = map[level] || map.alto;
    const custom = this.props.label;
    const label = (typeof custom === "string" && custom.trim()) ? custom : m.label;
    return { bg: m.bg, fg: m.fg, bd: m.bd, dot: m.dot, label };
  }
}
</script>
</body>
</html>
