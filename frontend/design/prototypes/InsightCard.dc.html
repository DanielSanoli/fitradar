<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; overflow:hidden; border-radius:14px; border:1px solid hsl(215 14% 22%); background:linear-gradient(155deg, hsl(215 18% 15.5%), hsl(215 22% 11%)); box-shadow:0 8px 30px rgba(0,0,0,0.35); padding:18px 20px; height:100%; box-sizing:border-box; font-family:'Segoe UI', system-ui, -apple-system, sans-serif;">
  <div style="position:absolute; top:-52px; right:-42px; width:150px; height:150px; border-radius:999px; background:radial-gradient(circle, {{ glowColor }}, transparent 68%); opacity:0.16; pointer-events:none;"></div>
  <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%); pointer-events:none;"></div>
  <div style="position:relative; display:flex; flex-direction:column; gap:14px; height:100%;">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px; min-height:24px; flex-wrap:wrap;">
      <span style="font-size:11.5px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:hsl(210 10% 62%); white-space:nowrap;">{{ label }}</span>
      <sc-if value="{{ riskLevel }}" hint-placeholder-val="alto">
        <dc-import name="RiskBadge" level="{{ riskLevel }}" label="{{ riskLabel }}" hint-size="100px,24px"></dc-import>
      </sc-if>
    </div>
    <div style="display:flex; align-items:baseline; gap:5px;">
      <span style="font-size:38px; font-weight:800; letter-spacing:-0.025em; color:hsl(210 20% 96%); line-height:1;">{{ value }}</span>
      <span style="font-size:16px; font-weight:600; color:hsl(210 10% 58%);">{{ unit }}</span>
    </div>
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:10px; margin-top:auto; min-height:18px;">
      <sc-if value="{{ delta }}" hint-placeholder-val="+8%">
        <span style="display:inline-flex; align-items:center; gap:4px; font-size:12.5px; font-weight:700; color:{{ trendColor }};">{{ trendArrow }} {{ delta }}</span>
      </sc-if>
      <sc-if value="{{ hasSpark }}" hint-placeholder-val="{{ true }}">
        <svg width="116" height="34" viewBox="0 0 116 34" preserveAspectRatio="none" style="overflow:visible; flex:none;">
          <polyline points="{{ areaPoints }}" fill="{{ glowColor }}" fill-opacity="0.10" stroke="none"></polyline>
          <polyline points="{{ points }}" fill="none" stroke="{{ glowColor }}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
        </svg>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:290,&quot;height&quot;:172},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Alunos ativos&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;128&quot;,&quot;tsType&quot;:&quot;string|number&quot;},&quot;unit&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;delta&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+8%&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;trend&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;up&quot;,&quot;down&quot;,&quot;flat&quot;],&quot;default&quot;:&quot;up&quot;,&quot;tsType&quot;:&quot;'up'|'down'|'flat'&quot;},&quot;spark&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[58,62,60,68,72,70,78,84],&quot;tsType&quot;:&quot;number[]&quot;},&quot;riskLevel&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;baixo&quot;,&quot;medio&quot;,&quot;alto&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;riskLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;glowColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;hsl(165 76% 48%)&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const W = 116, H = 34;
    const spark = Array.isArray(this.props.spark) ? this.props.spark : [];
    let points = "", areaPoints = "";
    const hasSpark = spark.length > 1;
    if (hasSpark) {
      const min = Math.min(...spark), max = Math.max(...spark);
      const range = (max - min) || 1;
      const step = W / (spark.length - 1);
      const pts = spark.map((v, i) => [i * step, H - 3 - ((v - min) / range) * (H - 6)]);
      points = pts.map(p => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
      areaPoints = "0," + H + " " + points + " " + W + "," + H;
    }
    const trend = this.props.trend || "flat";
    const trendColor = trend === "up" ? "hsl(165 70% 58%)" : trend === "down" ? "hsl(0 75% 72%)" : "hsl(210 10% 62%)";
    const trendArrow = trend === "up" ? "↑" : trend === "down" ? "↓" : "→";
    return {
      label: this.props.label ?? "",
      value: this.props.value ?? "—",
      unit: this.props.unit ?? "",
      delta: this.props.delta ?? "",
      riskLevel: this.props.riskLevel || null,
      riskLabel: this.props.riskLabel || "",
      glowColor: this.props.glowColor || "hsl(165 76% 48%)",
      hasSpark, points, areaPoints, trendColor, trendArrow,
    };
  }
}
</script>
</body>
</html>
