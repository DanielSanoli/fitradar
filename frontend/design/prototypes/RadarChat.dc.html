<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; height:100%; min-height:0; border-radius:14px; border:1px solid hsl(215 14% 22%); background:linear-gradient(180deg, hsl(215 18% 14.5%), hsl(215 22% 11%)); box-shadow:0 8px 30px rgba(0,0,0,0.35); overflow:hidden; font-family:'Segoe UI', system-ui, -apple-system, sans-serif;">
  <div style="position:relative; display:flex; align-items:center; gap:11px; padding:17px 20px; border-bottom:1px solid hsl(215 14% 22%); background:linear-gradient(120deg, hsl(165 76% 48% / 0.07), transparent 60%);">
    <div style="flex:none; position:relative; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:hsl(165 76% 48% / 0.14); border:1px solid hsl(165 76% 48% / 0.32);">
      <span style="width:12px; height:12px; background:hsl(165 76% 54%); transform:rotate(45deg); border-radius:3px; box-shadow:0 0 14px hsl(165 76% 52%);"></span>
    </div>
    <div style="display:flex; flex-direction:column; gap:2px;">
      <span style="font-size:15px; font-weight:700; color:hsl(210 17% 95%); letter-spacing:-0.01em;">Pergunte ao Radar</span>
      <span style="font-size:12px; color:hsl(210 10% 60%);">Copiloto de retenção · lê os sinais da sua comunidade</span>
    </div>
  </div>

  <div ref="{{ scrollRef }}" style="flex:1; min-height:0; overflow-y:auto; padding:18px 20px 6px; display:flex; flex-direction:column;">
    <sc-for list="{{ messages }}" as="msg" hint-placeholder-count="1">
      <sc-if value="{{ msg.isRadar }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex; gap:10px; align-items:flex-start; margin-bottom:14px; max-width:100%;">
          <div style="flex:none; width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:hsl(165 76% 48% / 0.14); border:1px solid hsl(165 76% 48% / 0.3); font-size:12px; font-weight:800; color:hsl(165 70% 62%);">R</div>
          <div style="flex:1; min-width:0; background:hsl(215 16% 18%); border:1px solid hsl(215 14% 24%); border-radius:4px 14px 14px 14px; padding:12px 14px;">
            <div style="font-size:13.5px; line-height:1.5; color:hsl(210 17% 90%); text-wrap:pretty;">{{ msg.text }}</div>
            <sc-if value="{{ msg.hasList }}" hint-placeholder-val="{{ false }}">
              <div style="display:flex; flex-direction:column; gap:8px; margin-top:11px;">
                <sc-for list="{{ msg.list }}" as="li" hint-placeholder-count="2">
                  <div style="display:flex; gap:9px; align-items:flex-start; font-size:13px; line-height:1.4; color:hsl(210 14% 84%);">
                    <span style="flex:none; margin-top:6px; width:5px; height:5px; border-radius:999px; background:hsl(165 76% 52%);"></span>
                    <span style="text-wrap:pretty;">{{ li }}</span>
                  </div>
                </sc-for>
              </div>
            </sc-if>
            <sc-if value="{{ msg.note }}" hint-placeholder-val="{{ false }}">
              <div style="margin-top:11px; padding-top:9px; border-top:1px solid hsl(215 14% 24%); font-size:11px; color:hsl(210 10% 56%); display:flex; gap:7px; align-items:center;">
                <span style="flex:none; width:14px; height:14px; border-radius:999px; border:1px solid hsl(210 10% 48%); display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; font-style:italic;">i</span>
                Sugestão, não orientação médica.
              </div>
            </sc-if>
          </div>
        </div>
      </sc-if>
      <sc-if value="{{ msg.isUser }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex; justify-content:flex-end; margin-bottom:14px;">
          <div style="max-width:82%; background:hsl(165 76% 48% / 0.16); border:1px solid hsl(165 76% 48% / 0.28); border-radius:14px 4px 14px 14px; padding:10px 13px; font-size:13.5px; line-height:1.45; color:hsl(165 45% 86%); text-wrap:pretty;">{{ msg.text }}</div>
        </div>
      </sc-if>
    </sc-for>
  </div>

  <div style="padding:13px 20px 16px; border-top:1px solid hsl(215 14% 22%); display:flex; flex-direction:column; gap:11px;">
    <div style="display:flex; flex-wrap:wrap; gap:8px;">
      <sc-for list="{{ suggestions }}" as="sug" hint-placeholder-count="3">
        <button onClick="{{ sug.onClick }}" style="cursor:pointer; border:1px solid hsl(165 76% 48% / 0.3); background:hsl(165 76% 48% / 0.08); color:hsl(165 55% 76%); border-radius:999px; padding:8px 14px; font-size:12.5px; font-weight:600; font-family:inherit; transition:all .15s; white-space:nowrap;" style-hover="background:hsl(165 76% 48% / 0.16); border-color:hsl(165 76% 48% / 0.5);">{{ sug.text }}</button>
      </sc-for>
    </div>
    <div style="display:flex; align-items:center; gap:7px; font-size:11px; color:hsl(210 10% 50%);">
      <span style="flex:none; width:14px; height:14px; border-radius:999px; border:1px solid hsl(210 10% 42%); display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; font-style:italic;">i</span>
      As respostas do Radar são sugestões — não substituem orientação médica.
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:560},&quot;greeting&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;suggestions&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[&quot;Quem vai desistir essa semana?&quot;,&quot;Quem merece um parabéns?&quot;,&quot;Como está a aderência geral?&quot;],&quot;tsType&quot;:&quot;string[]&quot;},&quot;answers&quot;:{&quot;editor&quot;:null,&quot;default&quot;:{},&quot;tsType&quot;:&quot;Record&lt;string,{text:string;list?:string[]}&gt;&quot;}}">
const DEFAULTS = {
  greeting: "Oi, Marina! Eu cruzo os sinais da sua comunidade e aponto onde agir primeiro. Toque numa sugestão para começar.",
  suggestions: [
    "Quem vai desistir essa semana?",
    "Quem merece um parabéns?",
    "Como está a aderência geral?",
  ],
  answers: {
    "Quem vai desistir essa semana?": {
      text: "Três alunos puxam o alerta. Por ordem de gravidade:",
      list: [
        "Marcos Vieira — inativo há 9 dias",
        "Letícia Alves — só 2 check-ins em 3 semanas",
        "Bruno Tavares — caiu de 5x para 1x por semana",
      ],
    },
    "Quem merece um parabéns?": {
      text: "Esses três estão impecáveis essa semana — vale um reconhecimento:",
      list: [
        "Carla Souza — 14 dias seguidos de treino",
        "Diego Lima — recorde pessoal de carga",
        "Ana Prado — voltou a treinar 4x por semana",
      ],
    },
    "Como está a aderência geral?": {
      text: "Aderência média em 78%, +6 pts vs. a semana passada. O grupo das manhãs puxa para cima; o turno da noite caiu 4 pts — vale um empurrãozinho por lá.",
    },
  },
};

class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { messages: [] };
    this.scrollRef = React.createRef();
  }
  seedGreeting() {
    return this.props.greeting || DEFAULTS.greeting;
  }
  componentDidMount() {
    this.setState({ messages: [{ role: "radar", text: this.seedGreeting() }] });
  }
  componentDidUpdate(prev) {
    if (prev.greeting !== this.props.greeting) {
      this.setState({ messages: [{ role: "radar", text: this.seedGreeting() }] });
      return;
    }
    const el = this.scrollRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }
  ask = (q) => {
    const answers = this.props.answers || DEFAULTS.answers;
    const a = answers[q];
    const radarMsg = a
      ? { role: "radar", text: a.text, list: a.list || null, note: true }
      : { role: "radar", text: "Ainda não tenho um sinal claro para isso, mas sigo de olho na sua comunidade.", note: true };
    this.setState(s => ({ messages: [...s.messages, { role: "user", text: q }, radarMsg] }));
  };
  renderVals() {
    const messages = (this.state.messages || []).map(m => ({
      text: m.text,
      isRadar: m.role === "radar",
      isUser: m.role === "user",
      hasList: Array.isArray(m.list) && m.list.length > 0,
      list: m.list || [],
      note: !!m.note,
    }));
    const sugs = this.props.suggestions || DEFAULTS.suggestions;
    return {
      messages,
      suggestions: sugs.map(q => ({ text: q, onClick: () => this.ask(q) })),
      scrollRef: this.scrollRef,
    };
  }
}
</script>
</body>
</html>
