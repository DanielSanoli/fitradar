spring:
  application:
    name: fitradar
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fitradar}
    username: ${DATABASE_USERNAME:fitradar}
    password: ${DATABASE_PASSWORD:fitradar}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jackson:
    default-property-inclusion: non_null
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.2

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: fitradar

logging:
  pattern:
    correlation: "[%X{requestId}] "

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  storage:
    logo:
      directory: ${LOGO_STORAGE_DIR:data/uploads/logos}
      max-bytes: ${LOGO_MAX_BYTES:2097152}
    progress-photo:
      directory: ${PROGRESS_PHOTO_STORAGE_DIR:data/uploads/progress-photos}
      max-bytes: ${PROGRESS_PHOTO_MAX_BYTES:5242880}
  runtime:
    production: ${APP_PRODUCTION:false}
    demo-seed-enabled: ${DEMO_SEED_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
  pagination:
    default-size: ${PAGINATION_DEFAULT_SIZE:50}
    max-size: ${PAGINATION_MAX_SIZE:100}
  security:
    jwt:
      secret: ${JWT_SECRET:fitradar-dev-secret-please-change-this-to-a-long-random-value}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
      refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:fitradar_refresh}
      refresh-cookie-path: /api/v1/auth
      refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
      refresh-cookie-same-site: Strict
  billing:
    trial-days: ${BILLING_TRIAL_DAYS:14}
    asaas:
      enabled: ${ASAAS_ENABLED:false}
      base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
      api-key: ${ASAAS_API_KEY:}
      monthly-price: ${ASAAS_MONTHLY_PRICE:49.90}
      webhook-token: ${ASAAS_WEBHOOK_TOKEN:}
    marketplace:
      platform-fee-percent: ${MARKETPLACE_PLATFORM_FEE_PERCENT:10.00}
      platform-fee-percent-free: ${MARKETPLACE_PLATFORM_FEE_PERCENT_FREE:10.00}
      platform-fee-percent-pro: ${MARKETPLACE_PLATFORM_FEE_PERCENT_PRO:0.00}
    limits:
      free-max-students: ${BILLING_FREE_MAX_STUDENTS:30}
      free-max-active-programs: ${BILLING_FREE_MAX_ACTIVE_PROGRAMS:3}
  email:
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${EMAIL_FROM:FitRadar <no-reply@fitradar.app>}
  copilot:
    enabled: ${COPILOT_AI_ENABLED:false}
  retention:
    timezone: ${RETENTION_TIMEZONE:America/Sao_Paulo}
    alerts-cron: ${RETENTION_ALERTS_CRON:0 0 8 * * *}
    weights:
      inactivity: ${RETENTION_W_INACTIVITY:0.45}
      adherence-drop: ${RETENTION_W_ADHERENCE_DROP:0.30}
      low-adherence: ${RETENTION_W_LOW_ADHERENCE:0.25}
    high-threshold: ${RETENTION_HIGH_THRESHOLD:70}
    medium-threshold: ${RETENTION_MEDIUM_THRESHOLD:40}
    inactivity-saturation-days: ${RETENTION_INACTIVITY_SATURATION_DAYS:14}
    inactive-alert-days: ${RETENTION_INACTIVE_ALERT_DAYS:7}
    min-history-days: ${RETENTION_MIN_HISTORY_DAYS:7}
  digest:
    enabled: ${DIGEST_ENABLED:true}
    weekly-cron: ${DIGEST_WEEKLY_CRON:0 0 8 * * MON}
    nudge-cron: ${DIGEST_NUDGE_CRON:0 0 9 * * *}
    monthly-recap-cron: ${DIGEST_MONTHLY_RECAP_CRON:0 0 9 1 * *}
  push:
    enabled: ${PUSH_ENABLED:false}
    vapid-public-key: ${VAPID_PUBLIC_KEY:}
    vapid-private-key: ${VAPID_PRIVATE_KEY:}
    vapid-subject: ${VAPID_SUBJECT:mailto:support@fitradar.app}
    frontend-base-url: ${PUSH_FRONTEND_BASE_URL:http://localhost:8080}
  observability:
    metrics-enabled: ${METRICS_ENABLED:false}
    management-token: ${MANAGEMENT_TOKEN:}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:production}
  send-default-pii: false
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
