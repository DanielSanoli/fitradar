spring:
  datasource:
    url: jdbc:h2:mem:fitradar-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  ai:
    openai:
      api-key: ""

app:
  storage:
    logo:
      directory: ${java.io.tmpdir}/fitradar-test-logos
    progress-photo:
      directory: ${java.io.tmpdir}/fitradar-test-progress-photos
  runtime:
    production: false
  copilot:
    enabled: false
  digest:
    enabled: false
  billing:
    asaas:
      enabled: false
      api-key: ""
      webhook-token: test-webhook-token

logging:
  level:
    root: WARN
    com.sanoli.fitradar: INFO
