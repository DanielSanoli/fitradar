services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitradar
      POSTGRES_USER: fitradar
      POSTGRES_PASSWORD: fitradar
    ports:
      - "5432:5432"
    volumes:
      - fitradar_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitradar"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/fitradar
      DATABASE_USERNAME: fitradar
      DATABASE_PASSWORD: fitradar
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      APP_PRODUCTION: ${APP_PRODUCTION:-false}
      JWT_SECRET: ${JWT_SECRET:-fitradar-dev-secret-please-change-this-to-a-long-random-value}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
      COPILOT_AI_ENABLED: ${COPILOT_AI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ASAAS_ENABLED: ${ASAAS_ENABLED:-false}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEMO_SEED_ENABLED: ${DEMO_SEED_ENABLED:-true}
    ports:
      - "8080:8080"

volumes:
  fitradar_db:
